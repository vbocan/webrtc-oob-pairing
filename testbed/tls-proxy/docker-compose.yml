# TLS-intercepting forward proxy — scenario C4.
#
#   docker compose up -d     # bring up mitmproxy
#   docker compose down      # tear it down
#
# Persistent state (the generated CA) lives in ./mitmproxy, git-ignored.

services:

  # First run: connect once with the phone configured to use this proxy,
  # visit http://mitm.it, install the mitmproxy CA cert as a *user*
  # certificate, then re-enable the proxy. (Android system certs require
  # root; user certs work for Chrome, which is what we use.) After cert
  # install, all phone HTTPS traffic decrypts in the mitmweb UI at
  # http://localhost:8081.
  mitmproxy:
    image: mitmproxy/mitmproxy:latest
    container_name: qrwebrtc-mitmproxy
    restart: unless-stopped
    command:
      - mitmweb
      - --web-host=0.0.0.0
      - --web-port=8081
      - --listen-host=0.0.0.0
      - --listen-port=8080
      - --set
      - block_global=false
      - --set
      - web_password=testbed   # known password for the UI; testbed only
    ports:
      - "8080:8080/tcp"   # proxy
      - "8081:8081/tcp"   # web UI
    volumes:
      - ./mitmproxy:/home/mitmproxy/.mitmproxy
